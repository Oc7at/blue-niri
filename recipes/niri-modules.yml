---

modules:
  - type: dnf
    repos:
      cleanup: false
      copr:
        - yalter/niri
    install:
      packages:
        - niri
        - xdg-desktop-portal-gnome
        - xdg-desktop-portal-gtk
        - nautilus
        - gnome-keyring
        - mako
        - fuzzel
        - alacritty
        - waybar
        - swayidle
        - swaylock
        - swayimg
        - swaybg
        - xwayland-satellite
        - xdg-user-dirs
        - mate-polkit
        - qt5-qtwayland
        - qt6-qtwayland
        - dbus-tools
        - dbus-daemon
